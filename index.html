{% extends "base.html" %}
{% block content %}
    
        <title>Fertilizer Recommendation</title>
        <style>
    body{
        margin:0;
        font-family:Segoe UI, Arial, sans-serif;
        background:linear-gradient(to right,#c2e59c,#64b3f4);
        height:100vh;
        overflow:hidden;
    }

    /* ===== HEADER ===== */
    .header{
        height:70px;
        background:#2e7d32;
        color:white;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:26px;
        font-weight:bold;
        letter-spacing:1px;
        box-shadow:0 3px 10px rgba(0,0,0,0.2);
    }

    /* ===== PAGE AREA ===== */
    .page{
        height:calc(100vh - 70px);
        display:flex;
        justify-content:center;
        align-items:center;
    }

    /* ===== MAIN FORM BOX ===== */
    .main-box{
        width:90%;
        max-width:1200px;
        height:92%;
        background:white;
        border-radius:18px;
        box-shadow:0 15px 35px rgba(0,0,0,0.2);

        display:flex;
        flex-direction:column;
        padding:25px;
    }

    /* ===== GRID ===== */
    .form-grid{
        flex:1;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:30px;
    }

    /* ===== FORM GROUP ===== */
    .form-group{
        display:flex;
        flex-direction:column;
        margin-bottom:10px;
    }

    label{
        font-weight:600;
        margin-bottom:4px;
    }

    /* ===== INPUT SIZE REDUCED ===== */
    input,select{
        height:36px;
        padding:6px 10px;
        border-radius:8px;
        border:1px solid #ccc;
        font-size:14px;
        width:100%;
        box-sizing:border-box;
    }

    /* ===== BUTTONS ===== */
    button{
        height:40px;
        border:none;
        border-radius:10px;
        background:#2e7d32;
        color:white;
        font-weight:bold;
        cursor:pointer;
    }

    button:hover{
        background:#1b5e20;
    }

    /* ===== WEATHER + VOICE BUTTON SIZE ===== */
    .weather-btn,
    .voice-btn{
        margin-top:6px;
        width:200px;
    }

    /* ===== STICKY PREDICT BUTTON ===== */
    .predict-bar{
        height:70px;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .predict-btn{
        width:260px;
        height:45px;
        font-size:18px;
        border-radius:12px;
        box-shadow:0 5px 12px rgba(0,0,0,0.2);
    }
    </style>


    </head>
    <body>

    <div class="header">
    🌾 Fertilizer Recommendation System
    </div>

    <div class="page">

    <div class="main-box">

    <form action="/predict" method="post">
    <div class="form-grid">

    <!-- LEFT COLUMN -->
    <div>

    <div class="form-group">
    <label>City Name</label>
    <input type="text" id="city" name="city" required>
    <button type="button" class="weather-btn" onclick="getWeather()">Get Weather</button>
    </div>

    <div class="form-group">
    <label>Temperature</label>
    <input type="text" id="temp_display" readonly>
    </div>

    <div class="form-group">
    <label>Humidity</label>
    <input type="text" id="humidity_display" readonly>
    </div>

    <div class="form-group">
    <label>Soil Moisture</label>
    <input type="text" id="moisture_display" readonly>
    </div>

    <input type="hidden" id="temp" name="temp">
    <input type="hidden" id="humidity" name="humidity">
    <input type="hidden" id="moisture" name="moisture">

    <button type="button" class="voice-btn" onclick="startListening()">🎤 Fill Details by Voice</button>

    </div>

    <!-- RIGHT COLUMN -->
    <div>

    <div class="form-group">
    <label>Soil Type</label>
    <select name="soil" id="soil">

    <option>Sandy</option>
    <option>Loamy</option>
    <option>Clayey</option>
    <option>Black</option>
    <option>Red</option>
    </select>
    </div>

    <div class="form-group">
    <label>Crop Type</label>
    <select name="crop" id="crop">
    <option>Rice</option>
    <option>Wheat</option>
    <option>Maize</option>
    <option>Sugarcane</option>
    <option>Barley</option>
    </select>
    </div>

    <div class="form-group">
    <label>Nitrogen</label>
    <input type="number" name="nitrogen" value="{{ n }}" placeholder="Auto / Optional">

    </div>

    <div class="form-group">
    <label>Phosphorous</label>
    <input type="number" name="phosphorous" value="{{ p }}" placeholder="Auto / Optional">

    </div>

    <div class="form-group">
    <label>Potassium</label>
    <input type="number" name="potassium" value="{{ k }}" placeholder="Auto / Optional">
    </div>
    

    <div class="form-group">
    <label>Language</label>
    <select name="language">
    <option value="en">English</option>
    <option value="hi">Hindi</option>
    <option value="te">Telugu</option>
    </select>
    </div>

    </div>

    </div>

    <div class="predict-bar">
    <button type="submit" class="predict-btn">Predict Fertilizer</button>
    </div>

    </form>
    </div>
    </div>
    <script>
    let voiceMode = false;
    </script>
    <script>
    function checkWeatherFilled() {
        const temp = document.getElementById("temp").value;
        const humidity = document.getElementById("humidity").value;
        const moisture = document.getElementById("moisture").value;

        if (!temp || !humidity || !moisture) {
            alert("Please click 'Get Weather' first.");
            return false;
        }
        return true;
    }

    function getWeather() {

        const city = document.getElementById("city").value;

        if (!city) {
            alert("Enter city first");
            return;
        }

        fetch("/fetch_weather", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({city: city})
        })
        .then(response => response.json())
        .then(data => {

        if (data.error) {
            alert(data.error);
        } else {
            document.getElementById("temp_display").value = data.temp + " °C";
            document.getElementById("humidity_display").value = data.humidity + " %";
            document.getElementById("moisture_display").value = data.moisture + " %";

            document.getElementById("temp").value = data.temp;
            document.getElementById("humidity").value = data.humidity;
            document.getElementById("moisture").value = data.moisture;
            autoFetchNPK();

            /* ✅ START STEP 2 ONLY AFTER WEATHER LOADS */
            if(voiceMode){
                askNutrients();
    }
        }

    })
        .catch(() => alert("Weather fetch failed"));

    }
    </script>
    <script>
    navigator.mediaDevices.getUserMedia({audio:true})
    .catch(()=>alert("Microphone permission required"));
    </script>
    <script>
    document.getElementById("soil").addEventListener("change", autoFetchNPK);
    document.getElementById("crop").addEventListener("change", autoFetchNPK);
    </script>
    <script>
    
    function startListening(){
        voiceMode = true;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if(!SpeechRecognition){
            alert("Use Chrome browser for voice input");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang="en-IN";

        /* =========================
        STEP 1 — ASK CITY
        ========================= */
        alert("Step 1: Please say your city name");

        recognition.start();

        recognition.onresult=function(event){

        let speech = event.results[0][0].transcript.toLowerCase();

        // ✅ clean punctuation
        speech = speech.replace(/[.,]/g,"").trim();

        console.log("Cleaned city:",speech);

        document.getElementById("city").value=speech;

        /* FETCH WEATHER */
        getWeather();
    };
        recognition.onerror=function(){
            alert("Voice failed. Try again.");
        };
    }
    </script>
    <script>
    function askNutrients(){

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recog2 = new SpeechRecognition();
        recog2.lang="en-IN";
        recog2.interimResults=false;

        alert("Speak like: Nitrogen 40 Phosphorous 30 Potassium 20");

        recog2.start();

        recog2.onresult=function(event){

            let speech = event.results[0][0].transcript.toLowerCase();

            // remove punctuation
            speech = speech.replace(/[.,]/g,"").trim();
            console.log("Cleaned speech:", speech);

            // word → number dictionary
            const wordToNum={
                "zero":0,"one":1,"two":2,"three":3,"four":4,"five":5,"six":6,"seven":7,"eight":8,"nine":9,
                "ten":10,"eleven":11,"twelve":12,"thirteen":13,"fourteen":14,"fifteen":15,
                "twenty":20,"thirty":30,"forty":40,"fifty":50,"sixty":60
            };

            // convert word numbers into digits
            speech = speech.split(" ").map(w=>{
                if(wordToNum[w]!==undefined) return wordToNum[w];
                return w;
            }).join(" ");

            console.log("Converted speech:", speech);

            // REGEX extraction
            let nMatch = speech.match(/nitrogen\s*(\d+)/);
            let pMatch = speech.match(/phosph[a-z]*\s*(\d+)/);
            let kMatch = speech.match(/pot[a-z]*\s*(\d+)/);

            let n = nMatch ? nMatch[1] : "";
            let p = pMatch ? pMatch[1] : "";
            let k = kMatch ? kMatch[1] : "";

            // fill inputs
            if(n!=="") document.querySelector("[name='nitrogen']").value=n;
            if(p!=="") document.querySelector("[name='phosphorous']").value=p;
            if(k!=="") document.querySelector("[name='potassium']").value=k;

            if(n!=="" && p!=="" && k!==""){
                alert("Values filled successfully ✔");
                voiceMode = false; 
            }else{
                alert("Try saying: Nitrogen 40 Phosphorus 30 Potassium 20");
            }

        };   // CLOSE onresult

    }        // CLOSE FUNCTION
    </script>
    <script>
    function getNPK(){

        const temp = document.getElementById("temp").value;
        const humidity = document.getElementById("humidity").value;
        const moisture = document.getElementById("moisture").value;

        const soil = document.querySelector("[name='soil']").value;
        const crop = document.querySelector("[name='crop']").value;

        if(!temp || !humidity || !moisture){
            alert("⚠️ First click Get Weather");
            return;
        }

        fetch("/get_npk", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                temp: temp,          // ✅ FIXED
                humidity: humidity,
                moisture: moisture,
                soil: soil,
                crop: crop
            })
        })
        
        .then(res => res.json())
        .then(data => {

            document.querySelector("[name='nitrogen']").value = data.n;
            document.querySelector("[name='phosphorous']").value = data.p;
            document.querySelector("[name='potassium']").value = data.k;

        })
        .catch(() => alert("Error getting NPK"));
    }
    </script>
    <script>
    function ensureNPK(){

        let n = document.querySelector("[name='nitrogen']").value;
        let p = document.querySelector("[name='phosphorous']").value;
        let k = document.querySelector("[name='potassium']").value;

        if(!n || !p || !k){
            alert("Click Auto Fill NPK first!");
            return false;
        }

        return true;
    }
    </script>
    <script>
    function autoFetchNPK() {

        const temp = document.getElementById("temp").value;
        const humidity = document.getElementById("humidity").value;
        const moisture = document.getElementById("moisture").value;

        const soil = document.getElementById("soil").value;
        const crop = document.getElementById("crop").value;

        if (!temp || !humidity || !moisture || !soil || !crop) {
            console.log("Waiting for all inputs...");
            return;
        }

        console.log("Fetching NPK...");

        fetch("/get_npk", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                temp: temp,
                humidity: humidity,
                moisture: moisture,
                soil: soil,
                crop: crop
            })
        })
        .then(res => res.json())
        .then(data => {
            console.log("NPK Received:", data);

            document.querySelector("[name='nitrogen']").value = data.n;
            document.querySelector("[name='phosphorous']").value = data.p;
            document.querySelector("[name='potassium']").value = data.k;
        })
        .catch(err => {
            console.log("NPK auto fill failed", err);
        });
    }
    </script>
    
    

{% endblock %}
