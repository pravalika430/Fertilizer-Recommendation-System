{% extends "base.html" %}
{% block content %}

<div class="auth-container">

    <div class="auth-card">
        <h2>Login</h2>
        <p class="sub-text">Access your SmartAgri dashboard</p>

        <form action="/login" method="post">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="auth-btn">Login</button>

        </form>

        <p class="switch">
            Don't have an account? <a href="/register">Register</a>
        </p>
    </div>

</div>

<style>
/* SAME STYLE AS REGISTER */
.auth-container{
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.auth-card{
    width:350px;
    padding:30px;
    border-radius:15px;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    text-align:center;
}

.sub-text{
    font-size:14px;
    color:#666;
    margin-bottom:20px;
}

.form-group{
    text-align:left;
    margin-bottom:15px;
}

.form-group input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

.auth-btn{
    width:100%;
    padding:10px;
    background:#6366f1;
    color:white;
    border:none;
    border-radius:10px;
    font-weight:bold;
}

.auth-btn:hover{
    background:#4f46e5;
}
</style>

{% endblock %}
