<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>{% block title %}SmartAgri{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    margin:0;

    background:
        linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)),
        url('https://images.pexels.com/photos/440731/pexels-photo-440731.jpeg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}


/* NAVBAR */
.navbar{
    background: rgba(34, 197, 94, 0.65); /* green */
    backdrop-filter: blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.25);
}

/* MAIN CONTENT */
.main-container{
    padding:30px;
}


.card{
    border-radius:20px;
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border:1px solid rgba(255,255,255,0.3);

    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 14px 40px rgba(0,0,0,0.18);
}

/* BUTTON STYLE */
.navbar .btn{
    border-radius:20px;
    padding:6px 14px;
    margin-left:5px;
}
.btn-light{
    background: rgba(255,255,255,0.8);
    border:none;
    backdrop-filter: blur(5px);
}

.btn-danger{
    background: linear-gradient(135deg,#ef4444,#dc2626);
    border:none;
}
.btn{
    font-weight:500;
    letter-spacing:0.3px;
}
.home-bg{
    min-height: 100vh;   /* fixed full screen */
    width: 100%;
    overflow-x: hidden;  /* prevents horizontal shift */

    padding: 40px 0;

    background:
        linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)),
        url('https://images.pexels.com/photos/440731/pexels-photo-440731.jpeg');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}
body{
    margin: 0;
    padding: 0;
}
.row{
    margin-left: 0;
    margin-right: 0;
}
html{
    overflow-y: scroll;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">
<div class="d-flex justify-content-between w-100 align-items-center">

    <span class="navbar-brand text-white" style="font-weight:800; letter-spacing:0.6px;">
    🌾 SmartAgri
    </span>

    <div>
        <a href="/" class="btn btn-light btn-sm">Home</a>
        <a href="/fertilizer" class="btn btn-light btn-sm">Predict</a>
        <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
        <a href="/profile" class="btn btn-light btn-sm">Profile</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>

</div>
</nav>

<div class="main-container">
{% block content %}{% endblock %}
</div>

</body>
</html>
